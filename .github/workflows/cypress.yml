name: Cypress Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cypress-io/github-action@v6
        with:
          browser: chrome
          command: npm run cy:run:smoke

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-results
          path: |
            cypress/screenshots
            cypress/videos
            mochawesome-report

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cypress-io/github-action@v6
        with:
          command: npm run cy:run:api

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-results
          path: |
            cypress/screenshots
            cypress/videos
            mochawesome-report

  ui-tests:
    runs-on: ubuntu-latest
    needs: smoke-tests
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]
    steps:
      - uses: actions/checkout@v4

      - uses: cypress-io/github-action@v6
        with:
          browser: ${{ matrix.browser }}
          command: npm run cy:run:ui

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-results-${{ matrix.browser }}
          path: |
            cypress/screenshots
            cypress/videos
            mochawesome-report
